[build]
  # This project uses Railway for deployment
  # The nixpacks.toml configuration is the actual deployment config
  command = "echo 'Deploy via Railway using nixpacks.toml'"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "https://api.nextgenoutreach.co.za/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
