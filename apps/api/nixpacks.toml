# v2 — prisma db push moved to start (DB unreachable during Docker build)
[phases.install]
cmds = [
  "npm install"
]

[phases.build]
cmds = [
  "npm run build --workspace=packages/types",
  "npm run build --workspace=packages/validators",
  "cd /app/apps/api && npx prisma generate && npm run build"
]

[start]
cmd = "npx prisma db push --schema /app/apps/api/prisma/schema.prisma --accept-data-loss && node /app/apps/api/dist/server.js"
