# v2 — prisma db push moved to start (DB unreachable during Docker build)
[phases.install]
cmds = [
  "npm install"
]

[phases.build]
cmds = [
  "npm run build --workspace=packages/types",
  "npm run build --workspace=packages/validators",
  "cd apps/api && npx prisma generate && npm run build"
]

[start]
cmd = "cd apps/api && npx prisma db push --accept-data-loss && node dist/server.js"
