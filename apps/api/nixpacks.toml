# v3 — prisma db push runs at build time via DATABASE_PUBLIC_URL (reachable from Docker build context)
[phases.install]
cmds = [
  "npm install"
]

[phases.build]
cmds = [
  "npm run build --workspace=packages/types",
  "npm run build --workspace=packages/validators",
  "cd /app/apps/api && npx prisma generate && npm run build",
  "DATABASE_URL=$DATABASE_PUBLIC_URL npx prisma db push --schema /app/apps/api/prisma/schema.prisma --accept-data-loss"
]

[start]
cmd = "node /app/apps/api/dist/server.js"
