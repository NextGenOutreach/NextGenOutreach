version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: ngo-postgres
    environment:
      POSTGRES_DB: ngo_dev
      POSTGRES_USER: ngo_user
      POSTGRES_PASSWORD: ngo_pass
    ports:
      - "5432:5432"
    volumes:
      - ngo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngo_user -d ngo_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ngo-redis
    ports:
      - "6379:6379"
    volumes:
      - ngo-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ngo-pgdata:
  ngo-redisdata:
